# yaml-language-server: $schema=https://raw.githubusercontent.com/sgnl-actions/schemas/main/metadata.schema.json
name: aad-unassign-role-from-user
description: Remove a directory role from a user in Azure Active Directory

# Input parameters for web form generation
inputs:
  userPrincipalName:
    type: text
    description: User principal name (UPN) of the user to remove the role from
    required: true
    validation:
      min: 1
      max: 256

  roleId:
    type: text
    description: Directory role ID to remove from the user
    required: true
    validation:
      min: 1
      max: 36

  directoryScopeId:
    type: text
    description: Directory scope ID for the role assignment to remove
    required: false
    validation:
      min: 1
      max: 256

  justification:
    type: text
    description: Justification for removing the role assignment
    required: false
    validation:
      min: 1
      max: 512

  address:
    type: text
    description: Optional Azure AD API base URL override
    required: false
    validation:
      min: 1
      max: 500

# Expected output structure
outputs:
  status:
    type: text
    description: Operation result (success, failed, recovered, etc.)

  userPrincipalName:
    type: text
    description: User principal name that was processed

  roleId:
    type: text
    description: Role ID that was removed

  userId:
    type: text
    description: User's directory object ID

  requestId:
    type: text
    description: Role removal request ID

  address:
    type: text
    description: The Azure AD API base URL used

environment:
  ADDRESS:
    type: text
    description: Azure AD API base URL
    required: false
  OAUTH2_CLIENT_CREDENTIALS_AUDIENCE:
    type: text
    description: OAuth2 client credentials audience
    required: false
  OAUTH2_CLIENT_CREDENTIALS_AUTH_STYLE:
    type: text
    description: OAuth2 client credentials auth style
    required: false
  OAUTH2_CLIENT_CREDENTIALS_CLIENT_ID:
    type: text
    description: OAuth2 client credentials client ID
    required: false
  OAUTH2_CLIENT_CREDENTIALS_SCOPE:
    type: text
    description: OAuth2 client credentials scope
    required: false
  OAUTH2_CLIENT_CREDENTIALS_TOKEN_URL:
    type: text
    description: OAuth2 client credentials token URL
    required: false

secrets:
  OAUTH2_CLIENT_CREDENTIALS_CLIENT_SECRET:
    type: text
    description: OAuth2 client secret
    required: false
  OAUTH2_AUTHORIZATION_CODE_ACCESS_TOKEN:
    type: text
    description: OAuth2 authorization code access token
    required: false

optional_one_of:
  - [
      "secrets.OAUTH2_CLIENT_CREDENTIALS_CLIENT_SECRET",
      "environment.OAUTH2_CLIENT_CREDENTIALS_CLIENT_ID",
      "environment.OAUTH2_CLIENT_CREDENTIALS_TOKEN_URL",
    ]
  - ["secrets.OAUTH2_AUTHORIZATION_CODE_ACCESS_TOKEN"]
